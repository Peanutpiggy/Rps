<!DOCTYPE html>

<body>
  <script>
   function computerPlay(){
    let options =["Rock","Paper","Scissors"]
    return options[Math.floor(Math.random()*options.length)]
    }
   function playRound(){
    if(playerSelection.toLowerCase()=="scissors"){
   switch (computerPlay()){
     case "Rock":
       alert("Scissors loses to Rock, you lost!");
       compScore++;
       total++;
       break;
     case "Paper":
        alert("Scissors wins Paper, you won!");
        userScore++;
        total++;
        break;
     default:
        alert("Draw!");
        draws++;
        total++;
   }
  }
    else if(playerSelection.toLowerCase()=="rock"){
    switch (computerPlay()){
      case "Scissors":
        alert("Rock wins Scissors, you won!");
        userScore++;
        total++;
        break;
      case "Paper":
        alert( "Rock loses to Paper, you lost!");
        compScore++;
        total++;
        break;
      default:
        alert( "Draw!");
        draws++;
        total++;
    }
  }
    else if(playerSelection.toLowerCase()=="paper"){
    switch (computerPlay()){
      case "Rock":
       alert( "Paper wins Rock, you won!");
       userScore++;
       total++;
        break;
      case "Scissors":
       alert( "Paper loses to Scissors, you lost!");
       compScore++;
       total++;
        break;
      default:
       alert( "Draw!");
       draws++;
       total++;
    }
  }
    else{
    alert("Please enter a correct selection!");
  }
} 
   function endScore(){
     if (userScore>compScore){
     alert ('You won the game!');}
    else if (compScore>userScore){
     alert ('You lost the game!');
    }
    else if (compScore==userScore){
      alert('Its a draw!');
    }
   }
   let userScore =0
   let compScore =0
   let draws=0
   let total=0
   while(total<5){
    var playerSelection = prompt("Rock,Paper or Scissors?");
   console.log(playRound());
   console.log(alert('Your score ='+' '+ userScore +'\n' +'Computer score ='+' '+ compScore + '\n'+'Draws =' +' '+draws));
   }
   console.log(endScore())
  </script>
